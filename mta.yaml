_schema-version: '3.1'\nID: sapui5-northwind-app\nversion: 1.0.0\ndescription: SAPUI5 App with Managed App Router\nparameters:\n  enable-parallel-deployments: true\n\nbuild-parameters:\n  before-all:\n    - builder: custom\n      commands:\n        - npm install\n        - npm run build\n\nmodules:\n  - name: northwind-ui\n    type: html5\n    path: app/northwind-ui\n    build-parameters:\n      builder: custom\n      commands:\n        - npm install\n        - npm run build\n    requires:\n      - name: uaa_northwind\n      - name: dest_northwind\n\n  - name: approuter\n    type: approuter.nodejs\n    path: app/approuter\n    build-parameters:\n      builder: npm-ci\n    requires:\n      - name: uaa_northwind\n      - name: dest_northwind\n    properties:\n      SEND_XFRAME_OPTIONS: true\n      FORWARDED_HOST_HEADER: proto,host\n      FORWARDED_PROTO_HEADER: proto\n\nresources:\n  - name: uaa_northwind\n    type: org.cloudfoundry.managed-service\n    parameters:\n      service: xsuaa\n      service-plan: application\n      config:\n        xsappname: northwind-app-${org}-${space}\n        oauth2-configuration:\n          grant-types:\n            - authorization_code\n            - refresh_token\n        role-collections:\n          - name: Northwind_Viewer\n            description: View Northwind Data\n            role-template-references:\n              - $XSAPPNAME.Viewer\n\n  - name: dest_northwind\n    type: org.cloudfoundry.managed-service\n    parameters:\n      service: destination\n      service-plan: lite